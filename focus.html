<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOCUS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    
    .focus-text {
      color: #ffffff;
      font-size: 120px;
      font-weight: 700;
      letter-spacing: 20px;
      text-align: center;
      user-select: none;
      animation: fadeIn 1s ease-in;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    
    @media (max-width: 768px) {
      .focus-text {
        font-size: 80px;
        letter-spacing: 10px;
      }
    }
    
    @media (max-width: 480px) {
      .focus-text {
        font-size: 60px;
        letter-spacing: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="focus-text">FOCUS.</div>
</body>
</html>
